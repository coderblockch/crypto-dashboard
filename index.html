<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <span class="header__logo">₿</span>
      <h1 class="header__title">Crypto Dashboard</h1>
    </div>
    <div class="header__controls">
      <select id="currency-selector" class="currency-selector">
        <option value="usd">USD $</option>
        <option value="eur">EUR €</option>
      </select>
      <div class="refresh-info">
        <span class="refresh-info__label">Refresh in</span>
        <span id="countdown" class="refresh-info__countdown">60s</span>
      </div>
      <div class="user-info">
        <span id="user-name" class="user-info__name"></span>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="cards-section">
      <div id="cards-grid" class="cards-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <section id="chart-section" class="chart-section hidden">
      <div class="chart-header">
        <h2 id="chart-title" class="chart-title"></h2>
        <div class="chart-controls">
          <button class="chart-range-btn active" data-days="1">24h</button>
          <button class="chart-range-btn" data-days="7">7d</button>
          <button class="chart-range-btn" data-days="30">30d</button>
        </div>
        <button id="chart-close" class="chart-close" aria-label="Close chart">✕</button>
      </div>
      <div class="chart-wrapper">
        <canvas id="price-chart"></canvas>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Data provided by <a href="https://www.coingecko.com" target="_blank" rel="noopener">CoinGecko</a></p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
