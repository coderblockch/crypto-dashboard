<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Dashboard — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-brand">
      <span class="header__logo">₿</span>
      <h1 class="header__title">Crypto Dashboard</h1>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <p id="login-error" class="auth-error hidden"></p>
      <button type="submit" class="auth-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form hidden">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="David Jiménez" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <p id="register-error" class="auth-error hidden"></p>
      <button type="submit" class="auth-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
